<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>八字 · 在线排盘</title>
<style>
:root{--bg:#060a10;--card:#0e141f;--card2:#131b28;--border:#1a2636;--border2:#233045;--gold:#c8a96e;--gold2:#a08048;--gold3:#e0cba0;--text:#c8d0d8;--dim:#687080;--dim2:#485060;--red:#e06060;--green:#5cb888;--blue:#68a0d8;--purple:#a888d8;--warn:#d4a840;--wood:#7ec87e;--fire:#e87060;--earth:#d8a858;--metal:#d4c870;--water:#60a0d8;--font:'PingFang SC','Microsoft YaHei',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.7}
.container{max-width:720px;margin:0 auto;padding:0 16px 40px}
.hd{text-align:center;padding:36px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
.hd h1{font-size:26px;color:var(--gold);letter-spacing:3px;font-weight:700}
.hd .sub{font-size:12px;color:var(--dim);margin-top:4px;letter-spacing:2px}
.ld{text-align:center;padding:48px 0;display:none}.ld.on{display:block}
.spin{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
#result{display:none}#result.on{display:block}

.icard{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.sel-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:flex-end;margin-bottom:10px}
.sel-row:last-child{margin-bottom:0}
.sg{display:flex;flex-direction:column;align-items:center;gap:4px}
.sg label{font-size:9px;color:var(--dim2);letter-spacing:1px}
.sg select,.sg input{background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:8px 6px;font-size:13px;outline:none;text-align:center;cursor:pointer;min-width:56px;transition:.2s;font-family:var(--font)}
.sg select:focus,.sg input:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,169,110,.15)}
.sec-label{font-size:12px;color:var(--dim2);letter-spacing:1px;white-space:nowrap;flex-shrink:0}

.btn{background:linear-gradient(135deg,#c8a96e,#9a7840);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:13px;cursor:pointer;letter-spacing:1px;font-weight:600;height:42px;transition:all .25s ease}
.btn:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 4px 12px rgba(200,169,110,.25)}
.btn-pai{display:block;width:240px;margin:18px auto 0;height:48px;font-size:15px;letter-spacing:3px;border-radius:12px}
.gender-row{display:inline-flex;background:var(--bg);border:1px solid var(--border2);border-radius:10px;overflow:hidden}
.gender-row .gr-btn{background:transparent;border:none;color:var(--dim);padding:8px 20px;font-size:13px;cursor:pointer;letter-spacing:1px;transition:all .2s;font-family:var(--font)}
.gender-row .gr-btn.on{background:rgba(200,169,110,.15);color:var(--gold)}

/* 结果样式 */
.bazi-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px}
.sect{font-size:13px;color:var(--gold);margin-bottom:16px;letter-spacing:2px;font-weight:600;display:flex;align-items:center;gap:8px}
.sect::before{content:'';width:3px;height:14px;background:var(--gold);border-radius:1.5px}
.info-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.info-tag{background:rgba(200,169,110,.07);border:1px solid rgba(200,169,110,.12);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--gold3)}
.info-tag b{color:var(--gold);font-weight:600}
.bz-table{width:100%;border-collapse:collapse;table-layout:fixed}
.bz-table th,.bz-table td{text-align:center;padding:10px 4px;border:1px solid var(--border2);font-size:13px;vertical-align:middle}
.bz-table th{background:rgba(200,169,110,.05);color:var(--dim);font-size:10px;font-weight:500;letter-spacing:1px}
.bz-table .gz{font-size:22px;color:var(--gold);font-weight:700;letter-spacing:2px}
.bz-table .ny{font-size:10px;color:var(--dim2)}.bz-table .cg{font-size:10px;color:var(--purple)}.bz-table .ssz{font-size:10px;color:var(--blue)}.bz-table .rc{background:rgba(200,169,110,.03)}
.wx-bar{display:flex;gap:4px}.wx-item{flex:1;text-align:center}
.wx-item .wn{font-size:10px;color:var(--dim2);margin-bottom:2px}
.wx-item .wb{height:6px;background:var(--border2);border-radius:3px;overflow:hidden}
.wx-item .wf{height:100%;border-radius:3px;transition:width .5s ease}
.wf.wood{background:var(--wood)}.wf.fire{background:var(--fire)}.wf.earth{background:var(--earth)}.wf.metal{background:var(--metal)}.wf.water{background:var(--water)}
.dy-track{display:flex;gap:4px;flex-wrap:wrap}
.dy-block{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px 8px;text-align:center;min-width:60px;flex:1}
.dy-block.cur{border-color:rgba(200,169,110,.45);background:rgba(200,169,110,.04)}
.dy-block .dy-gz{font-size:14px;color:var(--gold);font-weight:600}
.dy-block .dy-age{font-size:9px;color:var(--dim);margin-top:2px}
.dy-block .dy-tag{font-size:8px;color:var(--gold);background:rgba(200,169,110,.12);padding:1px 6px;border-radius:6px}
.an-card{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:28px 24px;margin-bottom:16px}
.an-card .an-title{font-size:16px;color:var(--gold);margin-bottom:22px;letter-spacing:2px;font-weight:600;text-align:center;padding-bottom:16px;border-bottom:1px solid var(--border)}
.an-p{font-size:14px;line-height:2;color:var(--text)}.an-p em{color:var(--gold3);font-style:normal;font-weight:500}
.an-summary{background:var(--bg);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-top:24px;text-align:center;font-size:11px;color:var(--dim)}
@media(max-width:480px){.hd h1{font-size:22px}.bz-table .gz{font-size:18px}.an-card{padding:20px 16px}.btn-pai{width:100%}}
</style>
</head>

    <div class="sg"><select id="sy"></select></div>
    <div class="sg"><select id="sm"></select></div>
    <div class="sg"><select id="sd"></select></div>
    <div class="sg"><label>时</label><select id="sh"></select></div>
    <div class="sg"><label>分</label><select id="smi"></select></div>
  </div>
  <div class="sel-row">
    <div class="gender-row">
      <button class="gr-btn on" id="bs" onclick="setCal(0)">阳历</button>
      <button class="gr-btn" id="bl" onclick="setCal(1)">农历</button>
    </div>
    <div class="gender-row">
      <button class="gr-btn on" id="bm" onclick="setGender(1)">男</button>
      <button class="gr-btn" id="bf" onclick="setGender(0)">女</button>
    </div>
  </div>
  <button class="btn btn-pai" onclick="go()">开始分析</button>
  <div style="text-align:center;font-size:10px;color:var(--dim2);margin-top:8px">基于真太阳时排盘</div>
</div>

<div class="ld" id="ld"><div class="spin"></div><div style="color:var(--dim);font-size:13px">八字排盘中…</div></div>
<div id="result"></div>
</div>

function X(id){return document.getElementById(id);}
function setGender(g){_gender=g;X('bm').classList.toggle('on',g===1);X('bf').classList.toggle('on',g===0);}
function setCal(v){_isLunar=v;X('bs').classList.toggle('on',v===0);X('bl').classList.toggle('on',v===1);}

function initRegion(){
  let o='';for(const p of REG)o+=`<option>${p[0]}</option>`;
  X('sp').innerHTML=o;X('sp').value='广东';onProv();
}
function onProv(){
  const name=X('sp').value;
  const prov=REG.find(p=>p[0]===name);
  X('sc').innerHTML='<option>请选择</option>';
  X('sx').innerHTML='<option>请先选市</option>';
  if(!prov)return;
  let o='<option>请选择</option>';
  for(const c of prov[1])o+=`<option value="${c[1]}|${c[0]}">${c[0]}</option>`;
  X('sc').innerHTML=o;
}
function onCity(){
  const val=X('sc').value;
  X('sx').innerHTML='<option>请选择</option>';
  if(!val||val==='请选择')return;
  const [lngStr,cname]=val.split('|');
  _curLng=parseFloat(lngStr)||116.4;
  const prov=REG.find(p=>p[0]===X('sp').value);
  if(!prov)return;
  const city=prov[1].find(c=>c[0]===cname);
  if(!city)return;
  let o='';
  for(const d of city[2])o+=`<option>${d}</option>`;
  X('sx').innerHTML=o||`<option>${cname}市区</option>`;
}

function initSelects(){
  const n=new Date(),cy=n.getFullYear();
  let o='';for(let i=cy-80;i<=cy;i++)o+=`<option value="${i}"${i===cy-30?' selected':''}>${i}</option>`;
  X('sy').innerHTML=o;
  o='';for(let i=1;i<=12;i++)o+=`<option value="${i}"${i===6?' selected':''}>${i}</option>`;
  X('sm').innerHTML=o;
  o='';for(let i=1;i<=31;i++)o+=`<option value="${i}"${i===15?' selected':''}>${i}</option>`;
  X('sd').innerHTML=o;
  o='';for(let i=0;i<=23;i++)o+=`<option value="${i}"${i===8?' selected':''}>${String(i).padStart(2,'0')}</option>`;
  X('sh').innerHTML=o;
  o='';for(let i=0;i<=59;i++)o+=`<option value="${i}">${String(i).padStart(2,'0')}</option>`;
  X('smi').innerHTML=o;
}

async function go(){
  const y=+X('sy').value,m=+X('sm').value,d=+X('sd').value,h=+X('sh').value,mi=+X('smi').value;
  if(!y||!m||!d)return;
  X('ld').classList.add('on');X('result').classList.remove('on');window.scrollTo({top:0,behavior:'smooth'});
  try{
    const [resp,aiResp]=await Promise.all([
      fetch('/api/bazi',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({year:y,month:m,day:d,hour:h,minute:mi,longitude:_curLng,gender:_gender,isLunar:_isLunar})}),
      fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({year:y,month:m,day:d,hour:h,minute:mi,longitude:_curLng,gender:_gender,isLunar:_isLunar})})
    ]);
    const r=await resp.json();if(r.error){alert(r.error);return}
    const ai=await aiResp.json().catch(()=>({fallback:true}));
    render(r,ai);
  }catch(e){alert('请求失败: '+e.message)}
  finally{X('ld').classList.remove('on')}
}

function render(r,ai){
  const city=X('sc').value.split('|')[1]||'',county=X('sx').value||'';
  let h='';
  h+='<div class="bazi-card"><div class="sect">基本信息</div>';
  h+='<div class="info-row">';
  h+=`<span class="info-tag">${r.gender}命 · <b>${r.bazi}</b> · 日主<b> ${r.riGan}</b></span>`;
  h+=`<span class="info-tag">北京 <b>${r.beijingTime}</b></span>`;
  h+=`<span class="info-tag">真太阳时 <b>${r.trueSolar}</b> (${r.solarOffset>0?'+':''}${r.solarOffset}分)</span>`;
  h+=`<span class="info-tag">出生地 <b>${X('sp').value} ${city} ${county}</b></span>`;
  h+='</div></div>';

  h+='<div class="bazi-card"><div class="sect">四柱八字</div>';
  h+='<table class="bz-table"><thead><tr>'+r.pillars.map(p=>`<th>${p.name}</th>`).join('')+'</tr></thead><tbody>';
  h+='<tr>'+r.pillars.map(p=>`<td class="rc"><div class="gz">${p.gan}</div><div style="font-size:11px;color:var(--dim)">${p.shiShen}</div></td>`).join('')+'</tr>';
  h+='<tr>'+r.pillars.map(p=>`<td class="rc"><div class="gz">${p.zhi}</div><div class="ssz">${p.shiShenZhi}</div></td>`).join('')+'</tr>';
  h+='<tr>'+r.pillars.map(p=>`<td><div class="cg">${(p.cangGan||[]).join(' ')}</div></td>`).join('')+'</tr>';
  h+='<tr>'+r.pillars.map(p=>`<td><div class="ny">${p.naYin}</div></td>`).join('')+'</tr>';
  h+='</tbody></table></div>';

  const wxN=['木','火','土','金','水'],wxC=['wood','fire','earth','metal','water'];
  const total=Math.max(1,Object.values(r.wuxingCount).reduce((a,b)=>a+b,0));
  h+='<div class="bazi-card"><div class="sect">五行分布</div><div class="wx-bar">';
  for(let i=0;i<5;i++){
    const cnt=r.wuxingCount[wxN[i]]||0;
    h+=`<div class="wx-item"><div class="wn">${wxN[i]} ${cnt}</div><div class="wb"><div class="wf ${wxC[i]}" style="width:${Math.round(cnt/total*100)}%"></div></div></div>`;
  }
  h+='</div></div>';

  if(r.dayun.length&&!r.dayun[0].info){
    h+='<div class="bazi-card"><div class="sect">大运流程</div><div class="dy-track">';
    for(const dy of r.dayun){
      h+=`<div class="dy-block${dy.cur?' cur':''}"><div class="dy-gz">${dy.ganZhi}</div><div class="dy-age">${dy.ages||dy.startAge}岁</div>${dy.cur?'<div class="dy-tag">当前</div>':''}</div>`;
    }
    h+='</div></div>';
  }

  const useAI=ai&&!ai.fallback&&ai.content;
  h+='<div class="an-card"><div class="an-title">命理分析报告</div>';
  if(useAI){
    const aiHtml=ai.content.replace(/\*\*(.+?)\*\*/g,'<em>$1</em>').replace(/###?\s*(.+)/g,'<div style="color:var(--gold3);font-weight:600;margin:16px 0 4px;font-size:14px">$1</div>').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
    h+=`<div class="an-p">${aiHtml}</div>`;
    h+=`<div class="an-summary">DeepSeek AI · 八字命理分析 | 仅供参考</div>`;
  }else{
    h+=`<div class="an-p" style="color:var(--dim)">分析服务暂不可用（${ai?.reason||'未知'}），请稍后重试。</div>`;
  }
  h+='</div>';

  X('result').innerHTML=h;X('result').classList.add('on');
  X('result').scrollIntoView({behavior:'smooth',block:'start'});
}
